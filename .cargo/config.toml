# Supply-chain settings for Rust projects.
# Merge into a project's .cargo/config.toml (project-local, committed).
#
# Cargo has no native minimum-release-age yet, so the cooldown for Rust
# is enforced two ways:
#   1. Renovate (renovate.json in this directory) handles the cooldown
#      on automated dependency-update PRs.
#   2. cargo-vet records which dependency versions you have actually
#      reviewed/trusted; unaudited new versions fail the check.
#
# Recommended per-project tooling (install once, run in CI and the
# pre-push hook):
#
#   cargo install cargo-vet     # in-tree audit records for every dep
#   cargo install cargo-audit   # checks the RustSec advisory database
#   cargo install cargo-deny    # license + advisory + source policy
#   cargo install cackle        # `cargo acl` — sandboxes build scripts,
#                                 proc-macros and tests, and enforces a
#                                 per-crate capability policy (which
#                                 crates may touch network/filesystem)
#
# Build-script and proc-macro isolation is the highest-value Rust
# control: an unsandboxed build script runs arbitrary code on your
# machine at build time. Cackle (`cargo acl`) sandboxes it via
# Bubblewrap and makes each capability an explicit, reviewed grant.

[build]
# Keep build output inside the project; never a shared global path.
# target-dir = "target"

[net]
# Fail fast instead of hanging on a flaky registry.
retry = 2
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"
